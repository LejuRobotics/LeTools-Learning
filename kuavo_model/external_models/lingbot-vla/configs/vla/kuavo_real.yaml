model:
  model_path: robbyant/lingbot-vla-4b
  tokenizer_path: Qwen/Qwen2.5-VL-3B-Instruct

data:
  datasets_type: vla
  data_name: kuavo
  train_path: /media/ruichen/5fe8ed68-6ff6-464f-af10-a89b65c040cf/sim/test/test_merge/normal
  joints:
    - arm.position: 14
    - effector.position: 2
  cameras:
    - head_cam_h
    - wrist_cam_l
    - wrist_cam_r
  num_workers: 8
  norm_type: meanstd
  norm_stats_file: assets/norm_stats/kuavo.json

train:
  output_dir: output/kuavo_lingbotvla
  chunk_size: 50
  data_parallel_mode: fsdp2
  enable_full_shard: false
  module_fsdp_enable: true
  use_compile: true
  rmpad: false
  rmpad_with_pos_ids: false
  ulysses_parallel_size: 1
  freeze_vision_encoder: false
  tokenizer_max_length: 72
  max_action_dim: 75
  max_state_dim: 75
  lr: 5.0e-5
  lr_decay_style: constant
  micro_batch_size: 32
  gradient_accumulation_steps: 1
  max_steps: 40000
  ckpt_manager: dcp
  save_steps: 10000
  save_epochs: 0
  enable_fp32: true
  enable_resume: true