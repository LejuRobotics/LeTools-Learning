# LeRobot Wall-X 简化配置。

dataset:  # 数据集相关设置。
  repo_id: "lerobot/your_dataset"  # 数据集名字，用来做标识。
  root: null  # 本地数据路径。

training:  # 训练流程设置。
  resume: false  # 是否从 output_dir 最新 checkpoint 继续训；续训改为 true，并修改 output_dir 为上阶段 run 的产物路径，如 outputs/train/wall_x_YYYYMMDD_HHMMSS。
  output_dir: "outputs/train/wall_x"  # 训练输出目录。
  job_name: "wall_x"  # 实验名。
  batch_size: 8  # 每张卡上的 batch size。
  steps: 100000  # 总训练步数。
  save_freq: 10000  # 每隔多少步存一次权重。
  log_freq: 100  # 每隔多少步打一次日志。
  eval_freq: 10000  # 每隔多少步做一次评测。
  num_workers: 4  # 读数据用的进程数。
  seed: 1000  # 随机种子。

wandb:  # wandb 设置。
  enable: false  # 是否启用 wandb。
  project: "lerobot_wall_x"  # wandb 项目名。

policy:  # 模型相关设置。
  type: "wall_x"  # 模型类型。
  pretrained_path: null  # LeRobot 整包 checkpoint；从 Flow 基座微调保持 null。二阶段请改为上一 run 的 <policy_name>_YYYYMMDD_HHMMSS/checkpoints/<step>/pretrained_model 路径。
  pretrained_name_or_path: "x-square-robot/wall-oss-flow"  # Wall-X 预训练主干（首次微调用这个，不是 pretrained_path）。
  chunk_size: 32  # 动作序列长度（wall-x action_horizon）。
  n_action_steps: 32  # 每次执行步数；须不大于 chunk_size。
  max_state_dim: 20  # 状态最大维度；按机器人实际维数调整。
  max_action_dim: 20  # 动作最大维度；按机器人实际维数调整。
  prediction_mode: "diffusion"  # diffusion 或 fast；fast 时需配 action_tokenizer_path。
  attn_implementation: "eager"  # eager / sdpa / flash_attention_2（需装 flash-attn）。
  optimizer_lr: 2.0e-5  # 主学习率。
  scheduler_warmup_steps: 1000  # warmup 步数。
  scheduler_decay_steps: 100000  # 学习率衰减步数（宜与 training.steps 对齐）。
  scheduler_decay_lr: 1.0e-6  # 衰减后最小学习率。
