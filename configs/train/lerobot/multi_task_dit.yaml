# LeRobot Multi-Task DiT 简化配置。

dataset:  # 数据集相关设置。
  repo_id: "lerobot/your_dataset"  # 数据集名字，用来做标识。
  root: null  # 本地数据路径。

training:  # 训练流程设置。
  resume: false  # 是否从 output_dir 最新 checkpoint 继续训；续训改为 true，并修改 output_dir 为上阶段 run 的产物路径，如 outputs/train/multi_task_dit_YYYYMMDD_HHMMSS。
  output_dir: "outputs/train/multi_task_dit"  # 训练输出目录。
  job_name: "multi_task_dit"  # 实验名。
  batch_size: 8  # 每张卡上的 batch size。
  steps: 100000  # 总训练步数。
  save_freq: 10000  # 每隔多少步存一次权重。
  log_freq: 100  # 每隔多少步打一次日志。
  eval_freq: 10000  # 每隔多少步做一次评测。
  num_workers: 4  # 读数据用的进程数。
  seed: 1000  # 随机种子。

wandb:  # wandb 设置。
  enable: true  # 是否启用 wandb。
  project: "lerobot_multi_task_dit"  # wandb 项目名。

policy:  # 模型相关设置。
  type: "multi_task_dit"  # 模型类型。
  pretrained_path: null  # 默认从头训；二阶段请改为上一 run 的 <policy_name>_YYYYMMDD_HHMMSS/checkpoints/<step>/pretrained_model 路径。
  vision_encoder_name: "openai/clip-vit-base-patch16"  # 视觉编码器。
  text_encoder_name: "openai/clip-vit-base-patch16"  # 文本编码器。
  n_obs_steps: 2  # 观测历史帧数。
  horizon: 32  # 模型预测动作总长度。
  n_action_steps: 24  # 每次执行步数；须小于 horizon。
  objective: "diffusion"  # diffusion 或 flow_matching（改后者见 total）。
  image_crop_shape: [224, 224]  # 图像 crop 尺寸。
  optimizer_lr: 2.0e-5  # 主学习率。
  scheduler_name: "cosine"  # 学习率策略。

