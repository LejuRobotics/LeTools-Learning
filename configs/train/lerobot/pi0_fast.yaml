# LeRobot PI0 Fast 简化配置。
# 官方 policy.type 为 `pi0_fast`。

dataset:  # 数据集相关设置。
  repo_id: "lerobot/your_dataset"  # 数据集名字，用来做标识。
  root: null  # 本地数据路径。

training:  # 训练流程设置。
  resume: false  # 是否从 output_dir 最新 checkpoint 继续训；续训改为 true，并修改 output_dir 为上阶段 run 的产物路径，如 outputs/train/pi0_fast_YYYYMMDD_HHMMSS。
  output_dir: "outputs/train/pi0_fast"  # 训练输出目录。
  job_name: "pi0_fast"  # 实验名。
  batch_size: 8  # 每张卡上的 batch size。
  steps: 30000  # 总训练步数。
  save_freq: 5000  # 每隔多少步存一次权重。
  log_freq: 100  # 每隔多少步打一次日志。
  eval_freq: 5000  # 每隔多少步做一次评测。
  num_workers: 4  # 读数据用的进程数。
  seed: 1000  # 随机种子。

wandb:  # wandb 设置。
  enable: false  # 是否启用 wandb。
  project: "lerobot_pi0_fast"  # wandb 项目名。

peft: null  # PEFT / LoRA 微调设置（默认全参微调）

policy:  # 模型相关设置。
  type: "pi0_fast"  # 模型类型。
  pretrained_path: null  #从头训练请改为 null。二阶段微调请改为上一 run 的 <policy_name>_YYYYMMDD_HHMMSS/checkpoints/<step>/pretrained_model 路径。
  dtype: "bfloat16"  # 计算精度（推荐 bfloat16；与 total 默认 float32 不同，simple 优先）。
  chunk_size: 50  # 每次预测多长的动作序列。
  n_action_steps: 50  # 每次真正执行多少步动作。
  max_state_dim: 32  # 状态最大维度。
  max_action_dim: 32  # 动作最大维度。
  max_action_tokens: 256  # 最大动作 token 数（训练标签长度上限）。
  use_relative_actions: false  # 相对动作；改为 true 前需对数据集 recompute_stats。
  image_resolution: [224, 224]  # 输入图像分辨率。
  action_tokenizer_name: "lerobot/fast-action-tokenizer"  # FAST 动作 tokenizer；自训 tokenizer 时改。
  gradient_checkpointing: true  # 省显存模式。
  optimizer_lr: 2.5e-5  # 全参微调学习率。
  scheduler_decay_lr: 2.5e-6  # 全参微调衰减后最小学习率。
  scheduler_warmup_steps: 1000  # warmup 步数。
  scheduler_decay_steps: 30000  # 学习率衰减步数（宜与 training.steps 对齐）。
